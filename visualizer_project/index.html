<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Algorithms Visualizer</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding: 20px;
        background-color: #f1f3f5;
      }

      .controls {
        margin-bottom: 20px;
        padding: 15px;
        background: white;
        border-radius: 8px;
        display: inline-block;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      label {
        margin: 0 15px;
        font-size: 18px;
        cursor: pointer;
        font-weight: bold;
      }

      .algo-groups {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 15px;
      }
      fieldset {
        border: 2px solid #dee2e6;
        border-radius: 8px;
        padding: 10px;
        margin: 0;
        text-align: left;
        min-width: 150px;
      }
      legend {
        font-size: 14px;
        color: #868e96;
        font-weight: bold;
        padding: 0 5px;
      }
      .algo-label {
        display: block;
        margin: 5px 0;
        font-size: 16px;
      }

      .sliders {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 30px;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #dee2e6;
      }
      .slider-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }
      input[type="range"] {
        width: 150px;
        cursor: pointer;
      }

      button {
        padding: 12px 35px;
        margin-top: 20px;
        font-size: 18px;
        background-color: #339af0;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #228be6;
      }
      button:disabled {
        background-color: #adb5bd;
        cursor: not-allowed;
      }
      #stop-btn {
        background-color: #ff6b6b;
        margin-left: 10px;
      }
      #stop-btn:hover:not(:disabled) {
        background-color: #fa5252;
      }

      #charts-wrapper {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 30px;
        margin-top: 20px;
      }
      .chart-box {
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      /* 통계 */
      .stats-text {
        font-size: 16px;
        font-weight: bold;
        color: #495057;
        margin-bottom: 10px;
      }

      .chart {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        height: 250px;
        width: 320px;
        gap: 1px;
      }
      .bar {
        background-color: #4dabf7;
        flex: 1;
        border-radius: 2px 2px 0 0;
      }
      .active {
        background-color: #fa5252;
      }
    </style>
  </head>
  <body>
    <h1>Algorithms Visualizer</h1>

    <div class="controls">
      <div class="algo-groups">
        <fieldset>
          <legend>O(n²)</legend>
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="bubble" checked /> Bubble
            Sort</label
          >
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="selection" checked />
            Selection Sort</label
          >
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="insertion" /> Insertion
            Sort</label
          >
        </fieldset>
        <fieldset>
          <legend>O(n log n)</legend>
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="merge" /> Merge
            Sort</label
          >
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="heap" /> Heap Sort</label
          >
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="quick" /> Quick
            Sort</label
          >
        </fieldset>
        <fieldset>
          <legend>Others</legend>
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="shell" /> Shell
            Sort</label
          >
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="counting" /> Counting
            Sort</label
          >
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="radix" /> Radix
            Sort</label
          >
          <label class="algo-label"
            ><input type="checkbox" name="algo" value="bucket" /> Bucket
            Sort</label
          >
        </fieldset>
      </div>

      <div class="sliders">
        <div class="slider-group">
          <label for="data-size"
            >데이터 개수 (N):
            <span id="size-val" style="color: #e03131">30</span></label
          >
          <input
            type="range"
            id="data-size"
            min="10"
            max="100"
            value="30"
            oninput="document.getElementById('size-val').innerText = this.value"
          />
        </div>
        <div class="slider-group">
          <label for="anim-speed"
            >애니메이션 속도:
            <span id="speed-val" style="color: #e03131">65</span></label
          >
          <input
            type="range"
            id="anim-speed"
            min="1"
            max="100"
            value="65"
            oninput="
              document.getElementById('speed-val').innerText = this.value
            "
          />
        </div>
      </div>

      <button id="start-btn" onclick="startSort()">Start!</button>
      <button id="stop-btn" onclick="stopSort()" disabled>Break</button>
    </div>

    <div id="charts-wrapper"></div>

    <script>
      let activeTimeouts = [];
      let completedAlgos = 0;

      async function startSort() {
        const btn = document.getElementById("start-btn");
        const stopBtn = document.getElementById("stop-btn");
        const wrapper = document.getElementById("charts-wrapper");

        // 체크된 체크박스의 값(value)들을 모아서 리스트로 만듭니다.
        const checkboxes = document.querySelectorAll(
          'input[name="algo"]:checked',
        );
        const selectedAlgos = Array.from(checkboxes).map((cb) => cb.value);

        if (selectedAlgos.length === 0) {
          alert("Please select at least one algorithm!\n");
          return;
        }

        // 초기화: 이전에 돌던게 있다면 확실히 멈춤
        stopSort();
        activeTimeouts = [];

        // 슬라이더에서 데이터 개수(N)와 속도 값을 가져옵니다.
        const n = document.getElementById("data-size").value;
        const speedValue = document.getElementById("anim-speed").value;

        // 속도 슬라이더가 100(빠름)일 때 딜레이는 1ms, 1(느림)일 때 100ms
        const delay = 101 - speedValue;

        btn.disabled = true;
        stopBtn.disabled = true; // 로딩 중에는 Stop 불가
        wrapper.innerHTML = "<p>loading...</p>";

        // 2. 파이썬 서버로 선택한 알고리즘들을 쉼표로 묶어서 요청합니다 (예: bubble,merge)
        const url = `/api/sort?algos=${selectedAlgos.join(",")}&n=${n}`;
        const response = await fetch(url);
        const data = await response.json();

        wrapper.innerHTML = "";

        // 3. 선택한 개수만큼 화면(chart-box)과 통계를 만든다.
        const chartElements = {};
        const statsElements = {};

        selectedAlgos.forEach((algo) => {
          const box = document.createElement("div");
          box.className = "chart-box";
          // 영문 이름을 보기 좋게 대문자로 바꿈 + 통계 표시
          box.innerHTML = `
                    <h3>${algo.toUpperCase()} SORT</h3>
                    <div class="stats-text" id="stats-${algo}">비교: 0 | 교환: 0</div>
                    <div class="chart" id="chart-${algo}"></div>
                `;
          wrapper.appendChild(box);

          chartElements[algo] = document.getElementById(`chart-${algo}`);
          statsElements[algo] = document.getElementById(`stats-${algo}`);
        });

        stopBtn.disabled = false; // 애니메이션 시작 시 Stop 활성화
        completedAlgos = 0;

        // 4. 각각의 애니메이션을 동시에 재생합니다.
        selectedAlgos.forEach((algo) => {
          const history = data[algo];
          const chartElement = chartElements[algo];
          const statsElement = statsElements[algo];

          let frame = 0;

          function drawFrame() {
            if (frame >= history.length) {
              chartElement
                .querySelectorAll(".bar")
                .forEach((b) => (b.style.backgroundColor = "#b197fc"));

              completedAlgos++;
              if (completedAlgos === selectedAlgos.length) {
                // 모든 알고리즘 종료 시
                btn.disabled = false;
                stopBtn.disabled = true;
              }
              return;
            }

            const state = history[frame];
            chartElement.innerHTML = "";

            statsElement.innerText = `비교: ${state.comp} | 교환: ${state.swap}`;

            const maxHeight = 230;

            state.arr.forEach((value, idx) => {
              const bar = document.createElement("div");
              bar.className = "bar";
              const barHeight = (value / n) * maxHeight;
              bar.style.height = barHeight + "px";

              if (state.active.includes(idx)) bar.classList.add("active");
              chartElement.appendChild(bar);
            });

            frame++;
            const timerId = setTimeout(drawFrame, delay);
            activeTimeouts.push(timerId);
          }
          drawFrame();
        });
      }

      function stopSort() {
        // 예약된 모든 프레임 그리기 작업 취소
        activeTimeouts.forEach((id) => clearTimeout(id));
        activeTimeouts = [];

        document.getElementById("start-btn").disabled = false;
        document.getElementById("stop-btn").disabled = true;
      }
    </script>
  </body>
</html>
